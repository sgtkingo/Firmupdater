name: Deploy Web Updater to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    # IMPORTANT: Set the working directory for all run steps
    defaults:
      run:
        working-directory: ./firmupdater

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump Version
        id: bump_version
        run: |
          cd ..
          
          # Read current version
          VERSION=$(cat VERSION)
          echo "Current version: $VERSION"
          
          # Parse version components (major.minor.patch.build)
          IFS='.' read -r MAJOR MINOR PATCH BUILD <<< "$VERSION"
          
          # Get latest commit message
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"
          
          # Check for version bump keywords in commit message
          if [[ $COMMIT_MSG =~ \(major\) ]]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            BUILD=0
            echo "Bumping MAJOR version"
          elif [[ $COMMIT_MSG =~ \(minor\) ]]; then
            MINOR=$((MINOR + 1))
            PATCH=0
            BUILD=0
            echo "Bumping MINOR version"
          elif [[ $COMMIT_MSG =~ \(patch\) ]]; then
            PATCH=$((PATCH + 1))
            BUILD=0
            echo "Bumping PATCH version"
          else
            BUILD=$((BUILD + 1))
            echo "Bumping BUILD number"
          fi
          
          # Create new version string
          NEW_VERSION="$MAJOR.$MINOR.$PATCH.$BUILD"
          echo "New version: $NEW_VERSION"
          echo "$NEW_VERSION" > VERSION
          
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Commit and push if version changed
          if [[ "$VERSION" != "$NEW_VERSION" ]]; then
            git add VERSION
            git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
            git push
          fi
          
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          # CRITICAL: Tell setup-node where to find the lock file for caching
          cache-dependency-path: ./firmupdater/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy VERSION to dist
        run: cp ../VERSION dist/VERSION

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Adjusted path to find the build output inside the subdirectory
          path: ./firmupdater/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4